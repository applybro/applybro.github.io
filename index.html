<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Editor Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
  background: radial-gradient(circle at top,#1a0033,#000);
  color:#fff;
  overflow-x:hidden;

  display:flex;
  flex-direction:column;
  align-items:center;   /* 🔥 CENTER FIX */
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}
.hero{text-align:center;padding:60px 20px}

.hero h1{
  font-size:40px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  margin:20px 10px;
  padding:10px 20px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #a855f7;
}

/* VIDEO CARDS */
.cards{
  position:relative;
  height:350px;
  margin-top:80px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  position:absolute;
  width:200px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  transition:0.5s;
  box-shadow:0 0 25px rgba(168,85,247,0.4);
}

.card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:nth-child(1){transform:translateX(-300px) rotate(-18deg) scale(0.8);}
.card:nth-child(2){transform:translateX(-150px) rotate(-8deg) scale(0.9);}
.card:nth-child(3){transform:translateX(0px) scale(1.1);}
.card:nth-child(4){transform:translateX(150px) rotate(8deg) scale(0.9);}
.card:nth-child(5){transform:translateX(300px) rotate(18deg) scale(0.8);}

.card:hover{
  transform:translateX(0) scale(1.2) !important;
  z-index:10;
}

/* FEATURES (VIDEO SECTION) */
.features{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:100px 20px;
  flex-wrap:wrap;
}

.feature-box{
  width:320px;
  background:#111;
  border-radius:15px;
  padding:15px;
}

/* YouTube video size */
.feature-box iframe{
  width:100%;
  aspect-ratio:16/9;
  border-radius:10px;
  margin-bottom:10px;
}

/* SERVICES */
.services{text-align:center;padding:50px}

.service-list{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:200px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:500px;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

.row{display:flex;gap:10px}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
}

footer{
  text-align:center;
  padding:30px;
  background:#000;
  margin-top:50px;
}
  .stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:40px;
  flex-wrap:wrap;
}
.stat{
  background:#111;
  padding:15px 25px;
  border-radius:10px;
}
  .whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:12px 18px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}


  /* MOBILE FIX */
@media (max-width: 768px){

  header{
    padding:15px 20px;
  }

  .hero{
    padding:40px 15px;
  }

  .hero h1{
    font-size:26px;
    line-height:1.3;
  }

  .hero p{
    font-size:14px;
  }

  .btn{
    padding:8px 16px;
    font-size:14px;
  }

  /* CARDS CENTER FIX */
  .cards{
    height:260px;
    margin-top:40px;
  }

  .card{
    width:130px;
    height:220px;
  }

  .card:nth-child(1){
    transform:translateX(-140px) rotate(-15deg) scale(0.8);
  }
  .card:nth-child(2){
    transform:translateX(-70px) rotate(-7deg) scale(0.9);
  }
  .card:nth-child(3){
    transform:translateX(0px) scale(1);
  }
  .card:nth-child(4){
    transform:translateX(70px) rotate(7deg) scale(0.9);
  }
  .card:nth-child(5){
    transform:translateX(140px) rotate(15deg) scale(0.8);
  }

  /* FEATURES STACK */
  .features{
    flex-direction:column;
    align-items:center;
  }

  .feature-box{
    width:90%;
  }
}

  .fade{
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

  /* SMOOTH SCROLL EFFECT */
.hero h1,
.hero p,
.cards{
  transition: transform 0.1s linear;
  will-change: transform;
}
  #typing{
  font-size:40px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  color:transparent;
  transform:scale(0.9);
  opacity:0;
  transition:0.3s;
}

  /* 🔥 MAIN CENTER CONTAINER FIX */
header,
.hero,
.features,
.services,
.stats{
  width:100%;
  max-width:1100px;
}
</style>
</head>

<body>

<!-- FORM -->
<div id="formModal" class="modal">

</div>

<footer>
  <p>© 2026 Portfolio</p>
</footer>

<script>
function openForm(){
  document.getElementById("formModal").style.display="flex";
}
function closeForm(){
  document.getElementById("formModal").style.display="none";
}
function scrollToWork(){
  document.getElementById("work").scrollIntoView({behavior:"smooth"});
}

const budget = document.getElementById("budget");
const value = document.getElementById("budgetValue");
budget.oninput = ()=> value.innerText = budget.value;
</script>
  <script>
let index = 0;
setInterval(()=>{
  const cards = document.querySelectorAll(".card");
  index++;

  cards.forEach((card,i)=>{
    let pos = (i + index) % cards.length;

    if(pos === 0) card.style.transform = "translateX(-300px) rotate(-18deg) scale(0.8)";
    if(pos === 1) card.style.transform = "translateX(-150px) rotate(-8deg) scale(0.9)";
    if(pos === 2) card.style.transform = "translateX(0px) scale(1.1)";
    if(pos === 3) card.style.transform = "translateX(150px) rotate(8deg) scale(0.9)";
    if(pos === 4) card.style.transform = "translateX(300px) rotate(18deg) scale(0.8)";
  });

},2000);
</script>
  <script>
const fades = document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
  fades.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});
    </script>
 <script>
window.addEventListener("scroll", () => {
  let scrollY = window.scrollY;

  // text move
  document.querySelector(".hero h1").style.transform =
    `translateY(${scrollY * 0.3}px)`;

  document.querySelector(".hero p").style.transform =
    `translateY(${scrollY * 0.2}px)`;

  // cards move (opposite direction for depth)
  document.querySelector(".cards").style.transform =
    `translateY(${scrollY * -0.2}px)`;
});
</script>   
  <script>
const text = "I Help Creators Grow with High Retention Video Editing";
let i = 0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;

    // smooth zoom + fade
    let el = document.getElementById("typing");
    el.style.opacity = 1;
    el.style.transform = "scale(1)";

    setTimeout(typeEffect, 40); // speed control (40 = smooth)
  }
}

window.onload = typeEffect;
</script>
