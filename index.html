<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Editor Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
  background: radial-gradient(circle at top,#1a0033,#000);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* WIDTH */
header,.hero,.features,.services,.stats{
  width:100%;
  max-width:1100px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

/* HERO */
.hero{text-align:center;padding:60px 20px}

#typing{
  font-size:40px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{margin-top:10px;color:#aaa}

.btn{
  margin:20px 10px;
  padding:10px 20px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  color:#fff;
}

/* CARDS */
.cards{
  position:relative;
  height:350px;
  margin-top:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}

.card{
  position:absolute;
  left:50%;
  top:50%;
  width:200px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  transition:all 0.8s ease;
  background:#222;
  box-shadow:0 15px 30px rgba(168,85,247,0.3);
}

.card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CURVE */
.pos0{transform:translate(-50%,-50%) translateX(-300px) translateY(60px) rotate(-18deg) scale(0.8);}
.pos1{transform:translate(-50%,-50%) translateX(-150px) translateY(30px) rotate(-8deg) scale(0.9);}
.pos2{transform:translate(-50%,-50%) translateX(0) scale(1.15); z-index:5;}
.pos3{transform:translate(-50%,-50%) translateX(150px) translateY(30px) rotate(8deg) scale(0.9);}
.pos4{transform:translate(-50%,-50%) translateX(300px) translateY(60px) rotate(18deg) scale(0.8);}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:40px;
  flex-wrap:wrap;
}
.stat{
  background:#111;
  padding:15px 25px;
  border-radius:10px;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:100px 20px;
  flex-wrap:wrap;
}

.feature-box{
  width:320px;
  background:#111;
  border-radius:15px;
  padding:15px;
}

.feature-box iframe{
  width:100%;
  aspect-ratio:16/9;
  border-radius:10px;
}

/* SERVICES */
.services{text-align:center;padding:50px}

.service-list{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  background:#111;
  padding:20px;
  border-radius:15px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:500px;
  max-height:80vh;
  overflow-y:auto;
}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
}

/* RANGE SLIDER */
input[type="range"]{
  width:100%;
  margin:15px 0;
  -webkit-appearance:none;
  height:6px;
  border-radius:10px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
}

input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  cursor:pointer;
  box-shadow:0 0 10px #ec4899;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#000;
  margin-top:50px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px 18px;
  border-radius:30px;
  color:#fff;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.card{width:130px;height:220px;}
.pos0{transform:translate(-50%,-50%) translateX(-140px) translateY(40px);}
.pos1{transform:translate(-50%,-50%) translateX(-70px) translateY(20px);}
.pos2{transform:translate(-50%,-50%) translateX(0);}
.pos3{transform:translate(-50%,-50%) translateX(70px) translateY(20px);}
.pos4{transform:translate(-50%,-50%) translateX(140px) translateY(40px);}
.feature-box{width:90%}
}
</style>
</head>

<body>

<header><h3>Vikas Edits</h3></header>

<section class="hero">
<h1 id="typing"></h1>
<p>Reels & Long Videos • YouTube • Fast Delivery</p>

<button class="btn" onclick="scrollToWork()">View Work</button>
<button class="btn" onclick="openForm()">Start Project</button>

<div class="cards">
<div class="card pos0"><video src="video1.mp4" autoplay loop muted></video></div>
<div class="card pos1"><video src="video2.mp4" autoplay loop muted></video></div>
<div class="card pos2"><video src="video3.mp4" autoplay loop muted></video></div>
<div class="card pos3"><video src="video4.mp4" autoplay loop muted></video></div>
<div class="card pos4"><video src="video5.mp4" autoplay loop muted></video></div>
</div>
</section>

<section class="stats">
<div class="stat">50+ Videos Edited</div>
<div class="stat">30% Boost</div>
<div class="stat">Fast Delivery</div>
</section>

<section class="features" id="work">
<div class="feature-box">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>
<div class="feature-box">
<iframe src="https://www.youtube.com/embed/ysz5S6PUM-U"></iframe>
</div>
</section>

<section class="about">
<h2>About</h2>
<p>I help creators grow with high-quality editing.</p>
</section>

<section class="services">
<h2>Services</h2>
<div class="service-list">
<div class="service">YouTube Editing</div>
<div class="service">Reels Editing</div>
</div>
</section>

<!-- FORM -->
<div id="formModal" class="modal">
<div class="modal-box">
<span onclick="closeForm()" style="float:right;cursor:pointer">✖</span>
<h2>Start Project</h2>

<form action="https://formspree.io/f/xwvarpde" method="POST">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<select name="project">
<option>Reels</option>
<option>YouTube</option>
</select>

<label>Project Budget: <span id="budgetValue">$500</span></label>
<input type="range" name="budget" min="10" max="1000" step="10" value="500" id="budgetRange">

<button class="btn">Submit</button>
</form>
</div>
</div>

<footer>© 2026 Portfolio</footer>

<script>
// typing
const text="I Make Videos That Get Views & Results";
let i=0;
(function t(){if(i<text.length){typing.innerHTML+=text[i++];setTimeout(t,40);}})();

// scroll
function scrollToWork(){
document.getElementById("work").scrollIntoView({behavior:"smooth"});
}

// form
function openForm(){
formModal.style.display="flex";
document.body.style.overflow="hidden";
}
function closeForm(){
formModal.style.display="none";
document.body.style.overflow="auto";
}

// slider cards
const cards=document.querySelectorAll(".card");
setInterval(()=>{
cards.forEach(c=>{
let p=[...c.classList].find(x=>x.startsWith("pos"));
let n=parseInt(p.replace("pos",""));
c.classList.remove(p);
c.classList.add("pos"+((n+1)%5));
});
},2000);

// budget live value
const budgetRange=document.getElementById("budgetRange");
const budgetValue=document.getElementById("budgetValue");

budgetRange.addEventListener("input",()=>{
budgetValue.innerText="$"+budgetRange.value;
});
</script>

<a href="https://wa.me/917015425540?text=Hi" class="whatsapp">Chat</a>

</body>
</html>
