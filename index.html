<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Editor Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
  background: radial-gradient(circle at top,#1a0033,#000);
  color:#fff;
  overflow-x:hidden;
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
}

.hero{text-align:center;padding:60px 20px}

.hero h1{
  font-size:40px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  margin:20px 10px;
  padding:10px 20px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #a855f7;
}

/* VIDEO CARDS FIXED */
.cards{
  position:relative;
  height:350px;
  margin-top:80px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  position:absolute;
  width:200px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  transition:0.5s;
  box-shadow:0 0 25px rgba(168,85,247,0.4);
}

.card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PERFECT 5-CARD LAYOUT */
.card:nth-child(1){
  transform:translateX(-300px) rotate(-18deg) scale(0.8);
  z-index:1;
}
.card:nth-child(2){
  transform:translateX(-150px) rotate(-8deg) scale(0.9);
  z-index:2;
}
.card:nth-child(3){
  transform:translateX(0px) scale(1.1);
  z-index:5;
}
.card:nth-child(4){
  transform:translateX(150px) rotate(8deg) scale(0.9);
  z-index:2;
}
.card:nth-child(5){
  transform:translateX(300px) rotate(18deg) scale(0.8);
  z-index:1;
}

/* HOVER */
.card:hover{
  transform:translateX(0) scale(1.2) !important;
  z-index:10;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:100px 20px;
}

.feature-box{
  width:40%;
  height:200px;
  background:#111;
  border-radius:20px;
  padding:20px;
}

/* SERVICES */
.services{text-align:center;padding:50px}

.service-list{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:200px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:500px;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

.row{display:flex;gap:10px}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
}

footer{
  text-align:center;
  padding:30px;
  background:#000;
  margin-top:50px;
}
</style>
</head>

<body>

<header>
  <h3>MyPortfolio</h3>
</header>

<section class="hero">
  <h1>I Edit Videos That Hook Viewers</h1>
  <p>YouTube, Reels & Ads Editing for High Retention</p>

  <button class="btn" onclick="scrollToWork()">View Work</button>
  <button class="btn" onclick="openForm()">Hire Me</button>

  <div class="cards">
    <div class="card"><video src="video1.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video2.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video3.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video4.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video5.mp4" autoplay loop muted></video></div>
  </div>
</section>

<section class="features" id="work">
  <div class="feature-box">
    <h3>Project 1</h3>
    <p>Increased retention by 35%</p>
  </div>
  <div class="feature-box">
    <h3>Project 2</h3>
    <p>High converting ad edits</p>
  </div>
</section>

<section class="services">
  <h2>Services</h2>
  <div class="service-list">
    <div class="service">YouTube Editing</div>
    <div class="service">Reels</div>
    <div class="service">Ads</div>
  </div>
</section>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="modal-box">
    <span onclick="closeForm()" style="float:right;cursor:pointer">✖</span>
    <h2>Start Project</h2>

    <form>
      <div class="row">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
      </div>

      <select>
        <option>Project Type</option>
        <option>Reels</option>
        <option>YouTube</option>
      </select>

      <label>Budget: $<span id="budgetValue">500</span></label>
      <input type="range" min="20" max="10000" value="500" id="budget">

      <button class="btn">Submit</button>
    </form>
  </div>
</div>

<footer>
  <p>© 2026 Portfolio</p>
</footer>

<script>
function openForm(){
  document.getElementById("formModal").style.display="flex";
}
function closeForm(){
  document.getElementById("formModal").style.display="none";
}

function scrollToWork(){
  document.getElementById("work").scrollIntoView({behavior:"smooth"});
}

const budget = document.getElementById("budget");
const value = document.getElementById("budgetValue");
budget.oninput = ()=> value.innerText = budget.value;
</script>

</body>
</html>
