<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Editor Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
    body{
      background: radial-gradient(circle at top,#1a0033,#000);
      color:#fff;
      overflow-x:hidden;
    }

    header{
      display:flex;
      justify-content:space-between;
      padding:20px 50px;
    }

    header a{
      color:#fff;
      text-decoration:none;
      margin:0 10px;
    }

    .hero{
      text-align:center;
      padding:60px 20px;
    }

    .hero h1{
      font-size:40px;
      background:linear-gradient(90deg,#a855f7,#ec4899);
      -webkit-background-clip:text;
      color:transparent;
    }

    .hero p{
      margin-top:10px;
      color:#aaa;
    }

    .btn{
      margin:20px 10px;
      padding:10px 20px;
      border-radius:20px;
      border:none;
      cursor:pointer;
      background:linear-gradient(90deg,#a855f7,#ec4899);
      color:#fff;
    }

    /* VIDEO CARDS */
    .cards{
      display:flex;
      justify-content:center;
      margin-top:60px;
      perspective:1000px;
    }

    .card{
      width:180px;
      height:300px;
      margin:0 -30px;
      background:#222;
      border-radius:20px;
      overflow:hidden;
      transform:rotateY(0deg) scale(0.8);
      transition:0.5s;
      box-shadow:0 0 20px rgba(168,85,247,0.5);
    }

    .card video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .card:hover{
      transform:scale(1) rotateY(0deg);
      z-index:10;
    }

    .card:nth-child(1){transform:rotate(-20deg)}
    .card:nth-child(2){transform:rotate(-10deg)}
    .card:nth-child(3){transform:scale(1)}
    .card:nth-child(4){transform:rotate(10deg)}
    .card:nth-child(5){transform:rotate(20deg)}

    /* FEATURE SECTION */
    .features{
      display:flex;
      justify-content:center;
      gap:30px;
      margin:100px 20px;
    }

    .feature-box{
      width:40%;
      height:200px;
      background:#111;
      border-radius:20px;
      padding:20px;
      transition:0.4s;
    }

    .feature-box:hover{
      transform:translateY(-10px);
      box-shadow:0 0 20px #a855f7;
    }

    /* SERVICES */
    .services{
      text-align:center;
      padding:50px;
    }

    .service-list{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:30px;
      flex-wrap:wrap;
    }

    .service{
      background:#111;
      padding:20px;
      border-radius:15px;
      width:200px;
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:30px;
      background:#000;
      margin-top:50px;
    }

  </style>
</head>

<body>

<header>
  <h3>MyPortfolio</h3>
  <div>
    <a href="#">Home</a>
    <a href="#">Work</a>
    <a href="#">Contact</a>
  </div>
</header>

<section class="hero">
  <h1>I Edit Videos That Hook Viewers</h1>
  <p>YouTube, Reels & Ads Editing for High Retention</p>
  <button class="btn">View Work</button>
  <button class="btn">Hire Me</button>

  <div class="cards">
    <div class="card"><video src="video1.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video2.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video3.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video4.mp4" autoplay loop muted></video></div>
    <div class="card"><video src="video5.mp4" autoplay loop muted></video></div>
  </div>
</section>

<section class="features">
  <div class="feature-box">
    <h3>Project 1</h3>
    <p>Increased retention by 35%</p>
  </div>

  <div class="feature-box">
    <h3>Project 2</h3>
    <p>High converting ad edits</p>
  </div>
</section>

<section class="services">
  <h2>Services</h2>
  <div class="service-list">
    <div class="service">YouTube Editing</div>
    <div class="service">Reels / Shorts</div>
    <div class="service">Ads Editing</div>
    <div class="service">Motion Graphics</div>
  </div>
</section>

<footer>
  <p>© 2026 Video Editor Portfolio</p>
</footer>

<script>
  // SCROLL ANIMATION
  const cards = document.querySelectorAll(".card");

  window.addEventListener("scroll",()=>{
    let scroll = window.scrollY;

    cards.forEach((card,i)=>{
      card.style.transform = `rotate(${(i-2)*10}deg) translateY(${scroll*0.05}px)`;
    });
  });
</script>

</body>
</html>
