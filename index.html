<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
  background: radial-gradient(circle at top,#1a0033,#000);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* WIDTH */
header,.hero,.features,.services,.stats{
  width:100%;
  max-width:1100px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

/* HERO */
.hero{text-align:center;padding:60px 20px}

#typing{
  font-size:40px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{margin-top:10px;color:#aaa}

.btn{
  margin:20px 10px;
  padding:10px 20px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  color:#fff;
}

  .hero .btn{
  display:inline-block;
}

.hero{
  text-align:center;
}

 .hero-buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}
  
/* CARDS */
.cards{
  position:relative;
  height:350px;
  margin-top:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}

.card{
  position:absolute;
  left:50%;
  top:50%;
  width:200px;
  height:320px;
  border-radius:20px;
  overflow:hidden;

  transition: transform 0.8s ease, opacity 0.4s ease;

  background:#222;
  box-shadow:0 15px 30px rgba(168,85,247,0.3);
}

/* slide रोकने के लिए */
.no-move{
  transition: opacity 0.4s ease !important;
}

/* fade out */
.fade-out{
  opacity:0;
  pointer-events:none;
}

/* fade in */
.fade-in{
  opacity:0;
  animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}


  
.card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CURVE */
.pos0{transform:translate(-50%,-50%) translateX(-300px) translateY(60px) rotate(-18deg) scale(0.8);}
.pos1{transform:translate(-50%,-50%) translateX(-150px) translateY(30px) rotate(-8deg) scale(0.9);}
.pos2{transform:translate(-50%,-50%) translateX(0) scale(1.15); z-index:5;}
.pos3{transform:translate(-50%,-50%) translateX(150px) translateY(30px) rotate(8deg) scale(0.9);}
.pos4{transform:translate(-50%,-50%) translateX(300px) translateY(60px) rotate(18deg) scale(0.8);}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.stat{
  flex:1;
  min-width:140px;
  text-align:center;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:100px 20px;
  flex-wrap:wrap;
}

.feature-box{
  width:320px;
  background:#111;
  border-radius:15px;
  padding:15px;
}

.feature-box iframe{
  width:100%;
  aspect-ratio:16/9;
  border-radius:10px;
}

/* SERVICES */
.services{text-align:center;padding:50px}

.service-list{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.service{
  flex:1;
  min-width:140px;
  text-align:center;
}


  .stats, .features, .service-list{
  width:100%;
  justify-content:center;
  align-items:center;
}


  @media(max-width:768px){
  #page{
    transform:none !important;
  }
}
  
.service{
  background:#111;
  padding:20px;
  border-radius:15px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
  z-index:999999;
}

.modal-box{
  width:90%;
  max-width:500px;
  margin:auto;
}
  .modal-box{
  position:relative;
  z-index:10000;
}

  .modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
  
input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
}

/* RANGE SLIDER */
input[type="range"]{
  width:100%;
  margin:15px 0;
  -webkit-appearance:none;
  height:6px;
  border-radius:10px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
}

input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  cursor:pointer;
  box-shadow:0 0 10px #ec4899;
}

#page{
  width:100%;
  max-width:1100px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;

  transition: transform 0.2s ease-out;
  will-change: transform;
}
  
/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#000;
  margin-top:50px;
}
  

  
/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px 18px;
  border-radius:30px;
  color:#fff;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.card{width:130px;height:220px;}
.pos0{transform:translate(-50%,-50%) translateX(-140px) translateY(40px);}
.pos1{transform:translate(-50%,-50%) translateX(-70px) translateY(20px);}
.pos2{transform:translate(-50%,-50%) translateX(0);}
.pos3{transform:translate(-50%,-50%) translateX(70px) translateY(20px);}
.pos4{transform:translate(-50%,-50%) translateX(140px) translateY(40px);}
.feature-box{width:90%}
}

/* GLOBAL FIX */
html, body{
  overflow-x:hidden;
}

/* SCROLL ANIMATION FIX */
#page{
  will-change: transform;
}


  section{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

  .modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
  z-index:99999;
}

.modal-box{
  position:relative;
  z-index:100000;
}


  
</style>
</head>

<script>
// typing
const text = "I Make Videos That Get Views & Results";
const typing = document.getElementById("typing");

let i = 0;
typing.innerHTML = ""; // important reset

function type() {
  if (i < text.length) {
    typing.innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 40);
  }
}
type();

// scroll
function scrollToWork(){
document.getElementById("work").scrollIntoView({behavior:"smooth"});
}

// form
 // form
const formModal = document.getElementById("formModal");

function openForm(){
  formModal.style.display = "flex";
  document.body.style.overflow = "hidden";
  window.scrollTo(0,0);
}


  
function closeForm(){
  formModal.style.display = "none";
  document.body.style.overflow = "auto";
}

  

// slider cards
const cards = document.querySelectorAll(".card");

setInterval(() => {

  cards.forEach(c => {

    let currentClass = [...c.classList].find(x => x.startsWith("pos"));
    if (!currentClass) return;

    let n = Number(currentClass.replace("pos", ""));
    let next = (n + 1) % 5;

    if(n === 4){

      c.classList.add("no-move");
      c.classList.add("fade-out");

      setTimeout(() => {

        c.classList.remove(currentClass);
        c.classList.add("pos0");

        c.classList.remove("fade-out");
        c.classList.add("fade-in");

        setTimeout(() => {
          c.classList.remove("fade-in");
          c.classList.remove("no-move");
        }, 400);

      }, 400);

    } else {

      c.classList.remove(currentClass);
      c.classList.add("pos" + next);

    }

  });

}, 2500);



  
// budget live value

const budgetRange = document.getElementById("budgetRange");
const budgetValue = document.getElementById("budgetValue");

budgetRange.addEventListener("input",()=>{
  budgetValue.innerText="$"+budgetRange.value;
});

  
  const page = document.getElementById("page");

let target = 0;
let current = 0;

window.addEventListener("scroll", () => {
  target = window.scrollY;
});

function animate() {
  current += (target - current) * 0.08;

  // LIGHT smooth movement ONLY (no shake, no break)
  page.style.transform =
    `translate3d(0, ${-current * 0.05}px, 0)`;

  requestAnimationFrame(animate);
}

animate();

const videoModal = document.getElementById("videoModal");
const mainVideo = document.getElementById("mainVideo");

function openVideo(src){
  videoModal.style.display = "flex";
  mainVideo.src = src;
  mainVideo.muted = false;
  mainVideo.play();
}

function closeVideo(){
  videoModal.style.display = "none";
  mainVideo.pause();
}
  
</script>
